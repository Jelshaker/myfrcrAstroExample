<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFRCR - Sign Up / Sign In</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 300px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            color: #555;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Include padding and border in the element's total width */
        }

        button {
            background-color: #4CAF50; /* Green */
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #3e8e41;
        }

        a {
            text-decoration: none;
            color: #555;
        }
    </style>
</head>
  <header>
    <img
      src="./assets/myfrcrlogo white background.png"
      alt="myfrcrlogo"
      class="logo"
      width="100px"
      class="logo"
    />
    <nav>
      <ul class="nav-links">
        <li><a href="./index.html">Home/myFRCR.com</a></li>
        <li><a href="./abr/abr.html">ABR</a></li>
        <li><a href="./edir/edir.html">EDIR</a></li>
        <li><a href="./franzcr/franzcr.html">FRANZCR</a></li>
        <li><a href="./rcpsc/rcpsc.html">RCPSC</a></li>
      </ul>
    </nav>
  </header>
<body>
    <div class="container">
        <h2>Sign Up / Sign In</h2>
        <form action="#" method="post">  <!-- Replace '#' with your actual form submission URL -->

            <div class="input-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username">
            </div>

            <div class="input-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="input-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password">
            </div>

            <button type="submit">Sign Up / Sign In</button>

            <p>Already have an account? <a href="#">Login</a></p>
        </form>
    </div>
</body>
</html>
